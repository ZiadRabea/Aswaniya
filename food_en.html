<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aswania | Section</title>
  <meta name="description" content="Aswania - section page" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { cairo: ['Cairo', 'sans-serif'] },
          boxShadow: {
            soft: '0 10px 30px rgba(15, 23, 42, 0.08)',
            glow: '0 20px 60px rgba(249, 115, 22, 0.18)'
          }
        }
      }
    }
  </script>

  <style>
    .card-border { box-shadow: 0 1px 0 rgba(255,255,255,.7) inset, 0 1px 18px rgba(15,23,42,.05); }
  </style>
</head>

<body class="font-cairo text-slate-800 bg-gradient-to-b from-orange-50 via-white to-white">
  <header class="sticky top-0 z-50 border-b border-orange-100/70 bg-white/80 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between py-4 gap-4">
        <a href="en.html" class="flex items-center gap-3 group">
          <img src="imgs/logo.jpg" alt="Aswania" class="w-12 h-12 rounded-2xl shadow-glow object-cover">
          <div>
            <h1 class="text-xl font-extrabold text-slate-900 leading-none">Aswania</h1>
            <p class="text-sm text-slate-500">From the heart of Aswan to your home</p>
          </div>
        </a>

        <a href="en.html#sections" class="inline-flex items-center gap-2 rounded-full bg-slate-900 text-white px-5 py-3 text-sm font-bold shadow-soft hover:bg-slate-800 transition">
          Back to sections <span>→</span>
        </a>
      </div>
    </div>
  </header>

  <main id="pageRoot"></main>

  <footer class="border-t border-orange-100 bg-white/60 mt-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row items-center justify-between gap-3">
      <p class="text-slate-600">© <span id="year"></span> Aswania🧡</p>
      <a href="index.html" class="text-orange-600 font-bold hover:text-orange-700 transition">Back to home</a>
    </div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const pageData = {
      title: "Food (Nutrition)",
      badge: "Food / Nutrition",
      heroTitle: "Natural Food Products",
      heroText: "A section dedicated to natural and heritage food products, with a beautiful style suitable for ordering and hospitality.",
      products: [
        {
          name: "Premium Aswan Tamarind",
          desc: "Carefully selected dates with excellent quality and authentic taste.",
          img: "imgs/p2.jpeg",
          order: "I want to order: Premium Aswan Tamarind"
        },
        {
          name: "Pure Hibiscus",
          desc: "A refreshing natural drink suitable for iftar and hospitality.",
          img: "imgs/p1.jpeg",
          order: "I want to order: Pure Hibiscus"
        },
        {
          name: "Aswan Henna",
          desc: "Pure natural henna with no additives.",
          img: "imgs/p3.jpeg",
          order: "I want to order: Aswan Henna"
        },
        {
          name: "Dried Molokhia",
          desc: "Authentic homemade taste, carefully prepared.",
          img: "imgs/p4.jpeg",
          order: "I want to order: Dried Molokhia"
        },
        {
          name: "Dried Okra",
          desc: "A practical and delicious product with a heritage touch.",
          img: "imgs/p5.jpeg",
          order: "I want to order: Dried Okra"
        },
        {
          name: "Sudanese Chili",
          desc: "A bold flavor for lovers of authentic taste.",
          img: "imgs/p6.jpeg",
          order: "I want to order: Sudanese Chili"
        }
      ]
    };

    const root = document.getElementById("pageRoot");

    root.innerHTML = `
      <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-14">
        <div class="grid lg:grid-cols-2 gap-10 items-center">
          <div>
            <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-orange-100 text-orange-700 font-bold text-sm mb-6 border border-orange-200/60">
              ${pageData.badge}
            </span>
            <h2 class="text-4xl md:text-6xl font-black text-slate-900 leading-tight">${pageData.heroTitle}</h2>
            <p class="mt-5 text-lg md:text-xl text-slate-600 leading-9 max-w-2xl">${pageData.heroText}</p>
            <div class="mt-8">
              <a href="en.html#contact" class="inline-flex items-center gap-2 rounded-2xl bg-orange-600 text-white px-6 py-4 font-bold shadow-glow hover:bg-orange-700 hover:-translate-y-1 transition">
                Order on WhatsApp <span>💬</span>
              </a>
            </div>
          </div>

          <div class="bg-white rounded-[2rem] p-6 shadow-soft border border-orange-100 card-border">
            <img src="https://images.unsplash.com/photo-1511690078903-71dc5a49f5e3?auto=format&fit=crop&w=1200&q=80" class="w-full h-[320px] object-cover rounded-[1.5rem]" alt="${pageData.title}">
          </div>
        </div>
      </section>

      <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
          ${pageData.products.map(p => `
            <article class="bg-white rounded-[1.75rem] p-5 shadow-soft border border-orange-100 card-border hover:-translate-y-2 transition duration-300">
              <img src="${p.img}" alt="${p.name}" class="w-full h-56 object-cover rounded-2xl mb-4">
              <h3 class="text-xl font-extrabold text-slate-900">${p.name}</h3>
              <p class="text-slate-600 mt-3 leading-7">${p.desc}</p>
              <button onclick="openWhatsApp('${p.order}')" class="mt-5 w-full rounded-2xl bg-slate-900 text-white py-3 font-bold hover:bg-slate-800 hover:-translate-y-0.5 transition">
                Order on WhatsApp
              </button>
            </article>
          `).join("")}
        </div>
      </section>
    `;

    const phoneNumber = "201090133710";
    function openWhatsApp(message) {
      const encodedMessage = encodeURIComponent(message);
      const url = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
      window.open(url, "_blank", "noopener,noreferrer");
    }
  </script>
</body>
</html>
